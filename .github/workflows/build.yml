name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DRELEASE_USE_STATIC_CRT=ON .

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Upload artifacts
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: EROverlay-Release
          path: |
            build/bin/*.dll
            build/bin/*.exe
            build/bin/overlays/*.dll
